server.port=8082
spring.application.name=DOCTOR-SERVICE

# Register this service with Eureka Server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Enable Circuit Breaker for Feign clients
spring.cloud.openfeign.circuitbreaker.enabled=true

# Circuit Breaker opens if 50% of calls fail
resilience4j.circuitbreaker.instances.userService.failure-rate-threshold=50

# Need at least 5 calls before circuit breaker starts checking failure rate
resilience4j.circuitbreaker.instances.userService.minimum-number-of-calls=5

# Wait 10 seconds before trying again (OPEN -> HALF_OPEN)
resilience4j.circuitbreaker.instances.userService.wait-duration-in-open-state=10s

# Allow 3 test calls in HALF_OPEN state to check if service recovered
resilience4j.circuitbreaker.instances.userService.permitted-number-of-calls-in-half-open-state=3

# Spring Actuator - Expose all endpoints to monitor circuit breaker
management.endpoints.web.exposure.include=*

# Show circuit breaker health details
management.health.circuitbreakers.enabled=true
